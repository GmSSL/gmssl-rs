name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==========================================================================
  # Linux x86_64
  # ==========================================================================
  linux:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gcc

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  # ==========================================================================
  # macOS ARM64 (Apple Silicon)
  # ==========================================================================
  macos:
    name: macOS (ARM64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

  # ==========================================================================
  # Windows x86_64 MSVC
  # ==========================================================================
  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose
